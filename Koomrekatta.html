<h1>Koomrekatta</h1>

<h1>Koomrekatta</h1>
<p>Koomrekatta served as a British operational camp during the later phase of the <a href="1864_Duar_War.html">1864_Duar_War</a>.</p>
<p>After Bhutanese counterattacks near <a href="Dewangiri.html">Dewangiri</a>, British forces regrouped at Koomrekatta before preparing further operations in the frontier region.</p>
