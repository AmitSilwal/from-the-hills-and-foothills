<h1>Bykantpore</h1>
<p>Bykantpore was a zamindari estate in Bengal.</p>
<p>The <strong>Ambaree Fallacottah estate</strong> was originally taken from the Zemindar of Bykantpore and later given to Bhutan in 1784.</p>
