<h1>Places Index</h1>
<p>This index lists geographical locations referenced in the archive.</p>
<p>The lists below are generated automatically from place notes using metadata.</p>
<hr />
<p><code>dataview
TABLE WITHOUT ID file.link AS "Place"
FROM "06_Places"
WHERE type = "place" AND region = "dooars"
SORT file.name</code></p>
