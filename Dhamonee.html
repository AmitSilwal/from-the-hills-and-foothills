<h1>Dhamonee</h1>

<h1>Dhamonee</h1>
<p>Dhamonee was a Bhutan frontier stockade in the Dooars.</p>
<p>During the <a href="1864_Duar_War.html">1864_Duar_War</a> British forces advanced from <a href="Maynaguri.html">Maynaguri</a> and occupied Dhamonee without resistance.</p>
<p>The capture of Dhamonee helped secure the plains before the advance into the Bhutan foothills.</p>
